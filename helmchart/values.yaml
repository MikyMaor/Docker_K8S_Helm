replicaCount: 2

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: flask-monitor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

image:
  repository: miky97/flask-aws-monitor
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5001

aws:
  accessKey: ""
  secretKey: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
